name: Jimmer PostgreSQL CI

on:
  pull_request:
    paths:
      - '.github/workflows/jimmer-postgres-ci.yml'
      - 'pom.xml'
      - 'warm-flow-core/**'
      - 'warm-flow-orm/pom.xml'
      - 'warm-flow-orm/warm-flow-jimmer/**'
      - 'warm-flow-plugin/**'
      - 'sql/postgresql/**'
  push:
    branches:
      - master
      - dev
    paths:
      - '.github/workflows/jimmer-postgres-ci.yml'
      - 'pom.xml'
      - 'warm-flow-core/**'
      - 'warm-flow-orm/pom.xml'
      - 'warm-flow-orm/warm-flow-jimmer/**'
      - 'warm-flow-plugin/**'
      - 'sql/postgresql/**'

jobs:
  jimmer-postgres:
    name: Jimmer PostgreSQL integration tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: warm_flow_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d warm_flow_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build Jimmer modules
        run: mvn -q -pl warm-flow-orm/warm-flow-jimmer -am test

      - name: Run PostgreSQL workflow smoke
        run: >-
          mvn -q
          -pl warm-flow-orm/warm-flow-jimmer/warm-flow-jimmer-core
          -Dtest=JimmerPostgresIntegrationTest
          -Dwarm.jimmer.it.postgres.url=jdbc:postgresql://localhost:5432/warm_flow_ci
          -Dwarm.jimmer.it.postgres.user=postgres
          -Dwarm.jimmer.it.postgres.password=postgres
          test
